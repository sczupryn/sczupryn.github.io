<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz — Uczelnia</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>Quiz egzaminacyjny</h1>
      <p class="subtitle" id="header-subtitle">Wybierz przedmiot</p>
    </header>

    <main id="app-main">
      <!-- ekran wyboru przedmiotu -->
      <section id="screen-subjects" class="screen active">
        <div class="card">
          <h2>Przedmioty</h2>
          <p class="hint">Zaznacz wszystkie poprawne odpowiedzi. 1 punkt tylko przy pełnym trafieniu. Postęp zapisywany jest lokalnie w przeglądarce.</p>
          <ul id="subjects-list" class="subjects-list"></ul>
        </div>
      </section>

      <!-- ekran wyboru trybu -->
      <section id="screen-mode" class="screen">
        <div class="card">
          <h2 id="mode-subject-name">Tryb quizu</h2>
          <p class="hint" id="mode-hint">Wybierz, które pytania chcesz rozwiązać.</p>
          <p class="mode-last-result hidden" id="mode-last-result"></p>
          <div class="mode-options">
            <button type="button" class="mode-btn" id="btn-mode-full">
              <strong>Pełny test</strong>
              <span id="mode-full-count">Wszystkie pytania</span>
            </button>
            <button type="button" class="mode-btn" id="btn-mode-review">
              <strong>Powtórka błędnych</strong>
              <span id="mode-review-count">Brak pytań do powtórki</span>
            </button>
          </div>
          <div class="actions mode-actions">
            <button type="button" class="btn btn-secondary" id="btn-mode-back">← Wróć</button>
            <button type="button" class="btn btn-secondary btn-danger-outline hidden" id="btn-clear-history">Wyczyść historię</button>
          </div>
        </div>
      </section>

      <!-- ekran quizu -->
      <section id="screen-quiz" class="screen">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p class="progress-text" id="progress-text"></p>

        <div class="card quiz-card">
          <p class="question-number" id="question-number"></p>
          <h2 class="question-text" id="question-text"></h2>
          <ul class="answers-list" id="answers-list"></ul>

          <div class="feedback hidden" id="feedback"></div>

          <div class="actions">
            <button type="button" class="btn btn-secondary" id="btn-check">Sprawdź odpowiedź</button>
            <button type="button" class="btn btn-primary" id="btn-next">Dalej</button>
          </div>
        </div>

        <div class="score-live">
          Wynik: <strong id="score-live">0</strong> / <span id="score-total">0</span> pkt
          <span class="quiz-mode-badge hidden" id="quiz-mode-badge"></span>
        </div>
      </section>

      <!-- ekran wyników -->
      <section id="screen-results" class="screen">
        <div class="card results-card">
          <h2>Koniec quizu</h2>
          <p class="results-subject" id="results-subject"></p>
          <div class="results-score">
            <span class="results-number" id="results-score">0</span>
            <span class="results-max">/ <span id="results-max">0</span> pkt</span>
          </div>
          <p class="results-percent" id="results-percent"></p>
          <p class="results-mode-note hidden" id="results-mode-note"></p>
          <div class="actions results-actions">
            <button type="button" class="btn btn-primary" id="btn-restart">Powtórz ten sam tryb</button>
            <button type="button" class="btn btn-secondary" id="btn-review-wrong">Powtórka błędnych</button>
            <button type="button" class="btn btn-secondary" id="btn-home">Wybierz przedmiot</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
